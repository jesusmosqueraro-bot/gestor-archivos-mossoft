<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Gestor de Archivos</title>
    <!-- Favicon SVG con Ícono de Carpeta -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📁</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- SCRIPT DE GOOGLE RECAPTCHA -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body class="bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900 min-h-screen flex items-center justify-center p-4">

    <!-- Tarjeta Principal de Login -->
    <div class="w-full max-w-md bg-white/95 backdrop-blur-md rounded-2xl shadow-2xl p-8 border border-slate-200/50">
        
        <!-- Header / Logo -->
        <div class="text-center mb-6">
            <div class="w-16 h-16 bg-blue-600 text-white rounded-2xl flex items-center justify-center mx-auto mb-4 text-3xl shadow-lg shadow-blue-500/30">
                📁
            </div>
            <h1 class="text-2xl font-black text-slate-800 tracking-tight">Gestor de Archivos</h1>
            <p class="text-xs text-slate-500 mt-1 font-medium">Ingresa tus credenciales para acceder al sistema</p>
        </div>

        <!-- Alertas de Mensaje o Error -->
        {% if error %}
            <div class="mb-5 p-3 rounded-xl bg-red-50 border border-red-200 text-red-600 text-xs font-semibold flex items-center gap-2">
                <span>⚠️</span> {{ error }}
            </div>
        {% endif %}

        {% if mensaje %}
            <div class="mb-5 p-3 rounded-xl bg-emerald-50 border border-emerald-200 text-emerald-700 text-xs font-semibold flex items-center gap-2">
                <span>✅</span> {{ mensaje }}
            </div>
        {% endif %}

        <!-- Formulario -->
        <form action="/login" method="POST" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Usuario</label>
                <input type="text" name="usuario" placeholder="Ej: admin" required class="w-full text-sm px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all text-slate-800 font-medium">
            </div>

            <div>
                <div class="flex justify-between items-center mb-2">
                    <label class="text-xs font-bold text-slate-700 uppercase tracking-wider">Contraseña</label>
                    <a href="/recuperar" class="text-xs font-semibold text-blue-600 hover:text-blue-700 hover:underline">¿Olvidaste tu clave?</a>
                </div>
                <input type="password" name="password" placeholder="••••••••" required class="w-full text-sm px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all text-slate-800 font-medium">
            </div>

            <!-- CASILLA GOOGLE RECAPTCHA "NO SOY UN ROBOT" -->
            <div class="flex justify-center my-2">
                <div class="g-recaptcha" data-sitekey="6Lel3V4tAAAAABOKgvK5dG2sH0lEFu38wvBELCVy"></div>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg shadow-blue-500/25 transition-all transform hover:-translate-y-0.5 active:translate-y-0 text-sm">
                Iniciar Sesión →
            </button>
        </form>

        <!-- Footer Informativo y Marca de MosSoft -->
        <div class="mt-6 pt-5 border-t border-slate-100 text-center flex flex-col gap-1.5">
            <p class="text-[11px] text-slate-400 font-medium">
                🔒 Conexión segura y cifrada
            </p>
            <div class="flex justify-center items-center gap-2 text-[11px] font-bold text-slate-500">
                <span class="bg-blue-50 text-blue-700 px-2 py-0.5 rounded-md border border-blue-200">v1.0.0 Pro</span>
                <span>•</span>
                <span class="text-slate-700">Software desarrollado por <strong class="text-blue-600 font-black">MosSoft</strong></span>
            </div>
        </div>

    </div>

</body>
</html>
