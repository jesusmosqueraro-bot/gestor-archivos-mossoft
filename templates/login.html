<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arkiv | Iniciar Sesión</title>
    
    <!-- FAVICON VECTORIAL EXACTO A TU NUEVO LOGO -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='28' fill='%233b52e1'/><rect x='22' y='22' width='56' height='56' rx='10' fill='none' stroke='%23ffffff' stroke-width='6'/><path d='M22 44 L78 44' stroke='%23ffffff' stroke-width='6'/><path d='M42 58 L58 58' stroke='%23ffffff' stroke-width='6' stroke-linecap='round'/></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-slate-50 rounded-2xl shadow-2xl p-8 border border-slate-200/60 relative overflow-hidden">
        
        <!-- ÍCONO LOGO REPLICADO DE TU IMAGEN -->
        <div class="flex justify-center mb-4">
            <div class="w-20 h-20 bg-[#3b52e1] rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/30 transform hover:scale-105 transition-transform duration-300">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="3" ry="3"/>
                    <line x1="3" y1="10" x2="21" y2="10"/>
                    <line x1="9" y1="15" x2="15" y2="15"/>
                </svg>
            </div>
        </div>

        <!-- TÍTULO DE MARCA ARKIV Y SUBTÍTULO -->
        <div class="text-center mb-6">
            <h1 class="text-3xl font-serif font-bold tracking-tight text-slate-900">
                Arkiv
            </h1>
            <div class="w-12 h-0.5 bg-slate-300 mx-auto my-2"></div>
            <p class="text-[10px] font-semibold tracking-widest text-slate-500 uppercase">Documentos y Archivo</p>
        </div>

        {% if error %}
        <div class="mb-4 p-3 bg-red-100 border border-red-200 text-red-700 text-xs rounded-lg text-center font-medium">
            {{ error }}
        </div>
        {% endif %}

        {% if mensaje %}
        <div class="mb-4 p-3 bg-emerald-100 border border-emerald-200 text-emerald-700 text-xs rounded-lg text-center font-medium">
            {{ mensaje }}
        </div>
        {% endif %}

        <!-- FORMULARIO DE ACCESO (CAMPOS CONSERVADOS) -->
        <form action="/login" method="POST" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1">Usuario</label>
                <input type="text" name="usuario" required placeholder="admin" class="w-full text-sm px-4 py-2.5 bg-slate-100 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#3b52e1]/50 focus:bg-white transition-all text-slate-800">
            </div>

            <div>
                <div class="flex justify-between items-center mb-1">
                    <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider">Contraseña</label>
                    <a href="/recuperar" class="text-xs text-[#3b52e1] hover:underline font-medium">¿Olvidaste tu clave?</a>
                </div>
                <input type="password" name="contrasena" required placeholder="••••••••" class="w-full text-sm px-4 py-2.5 bg-slate-100 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#3b52e1]/50 focus:bg-white transition-all text-slate-800">
            </div>

            <!-- GOOGLE reCAPTCHA (MANTENIENDO TU CLAVE) -->
            <div class="flex justify-center pt-2">
                <div class="g-recaptcha" data-sitekey="6Lel3V4tAAAAABOKgvK5dG2sH0lEFu38wvBELCVy"></div>
            </div>

            <button type="submit" class="w-full bg-[#3b52e1] hover:bg-blue-700 text-white font-semibold py-3 rounded-xl shadow-lg shadow-blue-500/25 transition-all transform active:scale-95 text-sm">
                Iniciar Sesión →
            </button>
        </form>

        <!-- PIE DE PÁGINA -->
        <div class="mt-8 pt-4 border-t border-slate-200/80 text-center text-xs text-slate-400 flex flex-col items-center gap-1">
            <p class="flex items-center gap-1">
                <span class="text-emerald-500">🔒</span> Conexión segura y cifrada
            </p>
            <p class="text-[11px] text-slate-400">
                <span class="bg-blue-100 text-blue-700 font-bold px-2 py-0.5 rounded-full">v1.0.0 Pro</span> • Powered by <span class="font-bold text-slate-600">MosSoft</span>
            </p>
        </div>

    </div>

</body>
</html>
