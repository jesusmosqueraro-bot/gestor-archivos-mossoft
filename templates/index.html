<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arkiv | Iniciar Sesión</title>
    
    <!-- FAVICON SVG VECTORIAL DE ARKIV -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='grad' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:%232563eb;stop-opacity:1' /><stop offset='100%' style='stop-color:%237c3aed;stop-opacity:1' /></linearGradient></defs><rect width='100' height='100' rx='25' fill='url(%23grad)'/><path d='M25 35 C25 32 27 30 30 30 L42 30 C45 30 47 32 49 35 L53 40 L70 40 C73 40 75 42 75 45 L75 70 C75 73 73 75 70 75 L30 75 C27 75 25 73 25 70 Z' fill='%23ffffff' opacity='0.95'/><path d='M30 45 L70 45 L70 70 C70 73 68 75 65 75 L35 75 C32 75 30 73 30 70 Z' fill='%23ffffff'/><circle cx='50' cy='58' r='4' fill='%232563eb'/></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-slate-50 rounded-2xl shadow-2xl p-8 border border-slate-200/60 relative overflow-hidden">
        
        <!-- ÍCONO LOGO ELEGANTE -->
        <div class="flex justify-center mb-4">
            <div class="w-16 h-16 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/30 transform hover:scale-105 transition-transform duration-300">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 01-2-2V5a2 2 0 012-2h14a2 2 0 012 2v1a2 2 0 01-2 2M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4" />
                </svg>
            </div>
        </div>

        <!-- TÍTULO DE MARCA ARKIV -->
        <div class="text-center mb-6">
            <h1 class="text-3xl font-extrabold tracking-tight text-slate-800">
                Arkiv
            </h1>
            <p class="text-xs font-medium text-slate-500 mt-1">Ingresa tus credenciales para acceder al sistema</p>
        </div>

        {% if error %}
        <div class="mb-4 p-3 bg-red-100 border border-red-200 text-red-700 text-xs rounded-lg text-center font-medium">
            {{ error }}
        </div>
        {% endif %}

        <!-- FORMULARIO DE ACCESO -->
        <form action="/login" method="POST" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1">Usuario</label>
                <input type="text" name="usuario" required placeholder="admin" class="w-full text-sm px-4 py-2.5 bg-slate-100 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:bg-white transition-all text-slate-800">
            </div>

            <div>
                <div class="flex justify-between items-center mb-1">
                    <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider">Contraseña</label>
                    <a href="/recuperar" class="text-xs text-blue-600 hover:underline font-medium">¿Olvidaste tu clave?</a>
                </div>
                <input type="password" name="contrasena" required placeholder="••••••••" class="w-full text-sm px-4 py-2.5 bg-slate-100 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:bg-white transition-all text-slate-800">
            </div>

            <!-- GOOGLE reCAPTCHA -->
            <div class="flex justify-center pt-2">
                <div class="g-recaptcha" data-sitekey="6Lel3V4TAAAAABOKgvK5dG2sH0lEFu38wvBELCVy"></div>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-semibold py-3 rounded-xl shadow-lg shadow-blue-500/25 transition-all transform active:scale-95 text-sm">
                Iniciar Sesión →
            </button>
        </form>

        <!-- PIE DE PÁGINA -->
        <div class="mt-8 pt-4 border-t border-slate-200/80 text-center text-xs text-slate-400 flex flex-col items-center gap-1">
            <p class="flex items-center gap-1">
                <span class="text-emerald-500">🔒</span> Conexión segura y cifrada
            </p>
            <p class="text-[11px] text-slate-400">
                <span class="bg-blue-100 text-blue-700 font-bold px-2 py-0.5 rounded-full">v1.0.0 Pro</span> • Powered by <span class="font-bold text-slate-600">MosSoft</span>
            </p>
        </div>

    </div>

</body>
</html>
