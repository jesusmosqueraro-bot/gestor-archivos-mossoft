<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8 border border-slate-200">
        <h2 class="text-2xl font-bold text-center text-slate-800 mb-2">Recuperar Contraseña</h2>
        <p class="text-xs text-center text-slate-500 mb-6">Ingresa tu correo para recibir un código de verificación</p>

        {% if error %}
            <div class="mb-4 p-3 bg-red-100 text-red-700 text-sm rounded-lg border border-red-200">
                {{ error }}
            </div>
        {% endif %}

        {% if mensaje %}
            <div class="mb-4 p-3 bg-emerald-100 text-emerald-700 text-sm rounded-lg border border-emerald-200">
                {{ mensaje }}
            </div>
        {% endif %}

        {% if paso == 1 %}
        <!-- Paso 1: Solicitar Correo -->
        <form action="/recuperar" method="POST" class="flex flex-col gap-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Correo Electrónico</label>
                <input type="email" name="email" placeholder="ejemplo@correo.com" required class="w-full text-sm p-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white font-medium py-2.5 rounded-lg hover:bg-blue-700 transition-colors shadow">
                Enviar Código
            </button>
        </form>
        {% else %}
        <!-- Paso 2: Validar Código y Cambiar Contraseña -->
        <form action="/validar_codigo" method="POST" class="flex flex-col gap-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Código de Verificación (Revisa la Consola)</label>
                <input type="text" name="codigo" placeholder="123456" required class="w-full text-sm p-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Nueva Contraseña</label>
                <input type="password" name="nueva_password" placeholder="••••••••" required class="w-full text-sm p-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="submit" class="w-full bg-emerald-600 text-white font-medium py-2.5 rounded-lg hover:bg-emerald-700 transition-colors shadow">
                Actualizar Contraseña
            </button>
        </form>
        {% endif %}

        <div class="mt-6 text-center">
            <a href="/login" class="text-xs text-blue-600 hover:underline">Volver al inicio de sesión</a>
        </div>
    </div>
</body>
</html>
