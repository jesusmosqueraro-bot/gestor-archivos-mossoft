<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arkiv | Recuperar Contraseña</title>
    <!-- Favicon Unificado -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='bg' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:%230f172a'/><stop offset='100%' style='stop-color:%23020617'/></linearGradient><linearGradient id='plat' x1='0%' y1='0%' x2='0%' y2='100%'><stop offset='0%' style='stop-color:%23ffffff'/><stop offset='100%' style='stop-color:%23e2e8f0'/></linearGradient><linearGradient id='st' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:%2394a3b8'/><stop offset='100%' style='stop-color:%2364748b'/></linearGradient></defs><rect width='100' height='100' rx='22' fill='url(%23bg)'/><polygon points='50,16 18,78 30,78 50,52 70,78 82,78' fill='%231e293b'/><polygon points='50,16 18,78 32,78 50,42' fill='url(%23plat)'/><polygon points='50,16 82,78 68,78 50,42' fill='url(%23st)'/><polygon points='32,54 68,54 60,46 40,46' fill='%23020617'/><polygon points='34,52 66,52 60,46 40,46' fill='url(%23plat)'/><polygon points='50,28 58,40 50,52 42,40' fill='%230f172a' stroke='%23f8fafc' stroke-width='1.5'/><circle cx='50' cy='40' r='2.5' fill='%23f8fafc'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-3xl shadow-2xl max-w-sm w-full p-6 sm:p-8 relative overflow-hidden border border-slate-100">
        
        <!-- ENCABEZADO -->
        <div class="text-center mb-6">
            <div class="w-16 h-16 mx-auto mb-3 drop-shadow-md">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" class="w-full h-full">
                    <defs>
                        <linearGradient id="bgSlate" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#020617;stop-opacity:1" />
                        </linearGradient>
                        <linearGradient id="platLight" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
                        </linearGradient>
                        <linearGradient id="steelG" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#94a3b8;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#64748b;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <rect width="100" height="100" rx="22" fill="url(#bgSlate)"/>
                    <polygon points="50,16 18,78 30,78 50,52 70,78 82,78" fill="#1e293b" />
                    <polygon points="50,16 18,78 32,78 50,42" fill="url(#platLight)" />
                    <polygon points="50,16 82,78 68,78 50,42" fill="url(#steelG)" />
                    <polygon points="32,54 68,54 60,46 40,46" fill="#020617" />
                    <polygon points="34,52 66,52 60,46 40,46" fill="url(#platLight)" />
                    <polygon points="50,28 58,40 50,52 42,40" fill="#0f172a" stroke="#f8fafc" stroke-width="1.5" />
                    <circle cx="50" cy="40" r="2.5" fill="#f8fafc" />
                </svg>
            </div>

            <h1 class="text-2xl font-black text-slate-800 tracking-tight font-serif">Recuperar Contraseña</h1>
            <div class="h-0.5 w-8 bg-slate-200 mx-auto my-2 rounded-full"></div>
            <p class="text-[10px] font-bold text-slate-400 tracking-widest uppercase">Actualiza tus credenciales de acceso</p>
        </div>

        {% if error %}
            <div class="mb-4 p-3 bg-red-50 border border-red-200 text-red-600 text-xs rounded-xl font-medium text-center">
                ⚠️ {{ error }}
            </div>
        {% endif %}

        {% if exito %}
            <div class="mb-4 p-3 bg-emerald-50 border border-emerald-200 text-emerald-700 text-xs rounded-xl font-medium text-center">
                ✅ {{ exito }}
            </div>
        {% endif %}

        <form action="/validar_codigo" method="POST" class="flex flex-col gap-4">
            <div>
                <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1">Usuario o Correo</label>
                <input type="text" name="codigo" placeholder="Ej: admin o correo@ejemplo.com" required class="w-full text-xs p-3 border border-slate-200 rounded-xl bg-blue-50/40 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-800 font-medium transition-all">
            </div>

            <div>
                <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1">Nueva Contraseña</label>
                <input type="password" name="nueva_password" placeholder="••••••••" required class="w-full text-xs p-3 border border-slate-200 rounded-xl bg-blue-50/40 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-800 font-medium transition-all">
            </div>

            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-emerald-500/25 text-xs transition-all flex items-center justify-center gap-1.5 active:scale-[0.98]">
                Actualizar Contraseña →
            </button>
        </form>

        <div class="mt-6 pt-4 border-t border-slate-100 text-center">
            <a href="/login" class="text-xs text-blue-600 hover:underline font-bold">
                ← Volver al inicio de sesión
            </a>
        </div>

    </div>

</body>
</html>
