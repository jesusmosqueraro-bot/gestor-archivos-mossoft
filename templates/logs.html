<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arkiv | Auditoría y Logs</title>
    <!-- FAVICON OFICIAL ARKIV (SÍMBOLO GEOMÉTRICO) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230b1329'/><path d='M50 20 L20 80 L38 80 L50 60 L62 80 L80 80 Z' fill='%23e2e8f0'/><path d='M50 20 L80 80 L62 80 L50 60 Z' fill='%2364748b'/><path d='M50 35 L62 55 L38 55 Z' fill='%230b1329'/><path d='M50 38 L58 50 L42 50 Z' fill='%2338bdf8'/><circle cx='50' cy='46' r='3' fill='white'/><path d='M35 60 L65 60 L50 56 Z' fill='%23e2e8f0'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 min-h-screen text-slate-100 flex flex-col font-sans">

    <!-- NAVBAR -->
    <nav class="bg-slate-800/80 backdrop-blur-md border-b border-slate-700/60 sticky top-0 z-40 px-4 py-3 sm:px-8 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <a href="/bienvenida" class="bg-slate-700 hover:bg-slate-600 text-slate-200 p-2 rounded-xl transition-all text-xs font-bold flex items-center gap-2">
                <i class="fa-solid fa-arrow-left"></i>
                <span class="hidden sm:inline">Volver</span>
            </a>
            <div class="h-6 w-px bg-slate-700"></div>
            <h1 class="text-lg font-bold text-white flex items-center gap-2 font-serif">
                <i class="fa-solid fa-clipboard-list text-purple-400"></i> Bitácora de Auditoría
            </h1>
        </div>

        <a href="/exportar_logs_csv?usuario={{ q_usuario }}&accion={{ q_accion }}&q={{ q_busqueda }}" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 px-4 rounded-xl shadow-lg shadow-emerald-500/20 text-xs transition-all flex items-center gap-2 active:scale-95">
            <i class="fa-solid fa-file-excel"></i>
            <span>Exportar a Excel (CSV)</span>
        </a>
    </nav>

    <!-- CONTENIDO -->
    <main class="flex-1 max-w-7xl w-full mx-auto p-4 sm:p-6 lg:p-8 space-y-6">

        <!-- BARRA DE FILTROS -->
        <form method="GET" action="/logs" class="bg-slate-800/60 border border-slate-700/60 rounded-3xl p-4 shadow-xl grid grid-cols-1 sm:grid-cols-3 gap-3 text-xs">
            <div>
                <label class="block text-slate-400 font-bold mb-1 uppercase tracking-wider text-[10px]">Filtrar por Usuario</label>
                <select name="usuario" onchange="this.form.submit()" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-2.5 text-slate-200 focus:outline-none focus:ring-2 focus:ring-purple-500">
                    <option value="">Todos los Usuarios</option>
                    {% for u in usuarios_opt %}
                        <option value="{{ u }}" {% if u == q_usuario %}selected{% endif %}>{{ u }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="block text-slate-400 font-bold mb-1 uppercase tracking-wider text-[10px]">Filtrar por Acción</label>
                <select name="accion" onchange="this.form.submit()" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-2.5 text-slate-200 focus:outline-none focus:ring-2 focus:ring-purple-500">
                    <option value="">Todas las Acciones</option>
                    {% for a in acciones_opt %}
                        <option value="{{ a }}" {% if a == q_accion %}selected{% endif %}>{{ a }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="block text-slate-400 font-bold mb-1 uppercase tracking-wider text-[10px]">Buscar en Detalles / Fecha</label>
                <div class="relative">
                    <input type="text" name="q" value="{{ q_busqueda }}" placeholder="Escribe y presiona Enter..." class="w-full bg-slate-900 border border-slate-700 rounded-xl pl-3 pr-8 py-2.5 text-slate-200 focus:outline-none focus:ring-2 focus:ring-purple-500">
                    <button type="submit" class="absolute right-2.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white"><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>
            </div>
        </form>

        <!-- TABLA DE LOGS -->
        <div class="bg-slate-800/60 border border-slate-700/60 rounded-3xl p-6 shadow-xl overflow-x-auto">
            <table class="w-full text-left text-xs text-slate-300">
                <thead class="text-[11px] uppercase tracking-wider text-slate-400 border-b border-slate-700/80">
                    <tr>
                        <th class="pb-3 px-4 font-bold">Fecha y Hora</th>
                        <th class="pb-3 px-4 font-bold">Usuario</th>
                        <th class="pb-3 px-4 font-bold">Acción realizada</th>
                        <th class="pb-3 px-4 font-bold">Detalle del Cambio</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-700/40">
                    {% if logs %}
                        {% for l in logs %}
                        <tr class="hover:bg-slate-800/40 transition-colors">
                            <td class="py-3.5 px-4 font-mono text-slate-400 whitespace-nowrap">
                                <i class="fa-regular fa-clock text-slate-500 mr-1.5"></i>{{ l[3] }}
                            </td>
                            <td class="py-3.5 px-4 font-bold text-white">
                                <span class="inline-flex items-center gap-1 bg-slate-900/60 border border-slate-700/70 px-2.5 py-1 rounded-lg">
                                    <i class="fa-solid fa-user text-purple-400"></i> {{ l[0] }}
                                </span>
                            </td>
                            <td class="py-3.5 px-4">
                                <span class="px-2.5 py-0.5 bg-purple-500/10 text-purple-400 border border-purple-500/20 text-[10px] font-bold rounded-full uppercase tracking-wider">
                                    {{ l[1] }}
                                </span>
                            </td>
                            <td class="py-3.5 px-4 text-slate-300 italic">{{ l[2] }}</td>
                        </tr>
                        {% endfor %}
                    {% else %}
                        <tr>
                            <td colspan="4" class="text-center py-10 text-slate-500 font-bold">
                                No se encontraron registros de auditoría que coincidan con los filtros.
                            </td>
                        </tr>
                    {% endif %}
                </tbody>
            </table>
        </div>

    </main>

</body>
</html>
