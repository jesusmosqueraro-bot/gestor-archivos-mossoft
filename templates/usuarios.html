<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arkiv | Gestión de Usuarios</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='bg' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:%230f172a'/><stop offset='100%' style='stop-color:%23020617'/></linearGradient><linearGradient id='plat' x1='0%' y1='0%' x2='0%' y2='100%'><stop offset='0%' style='stop-color:%23ffffff'/><stop offset='100%' style='stop-color:%23e2e8f0'/></linearGradient><linearGradient id='st' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:%2394a3b8'/><stop offset='100%' style='stop-color:%2364748b'/></linearGradient></defs><rect width='100' height='100' rx='22' fill='url(%23bg)'/><polygon points='50,16 18,78 30,78 50,52 70,78 82,78' fill='%231e293b'/><polygon points='50,16 18,78 32,78 50,42' fill='url(%23plat)'/><polygon points='50,16 82,78 68,78 50,42' fill='url(%23st)'/><polygon points='32,54 68,54 60,46 40,46' fill='%23020617'/><polygon points='34,52 66,52 60,46 40,46' fill='url(%23plat)'/><polygon points='50,28 58,40 50,52 42,40' fill='%230f172a' stroke='%23f8fafc' stroke-width='1.5'/><circle cx='50' cy='40' r='2.5' fill='%23f8fafc'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body id="main-body" class="bg-slate-100 min-h-screen p-3 sm:p-8 transition-colors duration-300 relative">

    <div class="custom-card max-w-4xl mx-auto bg-white rounded-xl shadow-md p-4 sm:p-6 w-full transition-colors duration-300">
        
        <!-- Encabezado -->
        <div class="flex justify-between items-center border-b pb-4 mb-6">
            <div>
                <a href="/bienvenida" class="text-xs text-blue-600 hover:underline">← Volver al Inicio</a>
                <h1 class="custom-text text-xl sm:text-2xl font-bold text-slate-800">Módulo de Gestión de Usuarios</h1>
            </div>
            <a href="/gestor" class="text-xs bg-slate-100 text-slate-700 border border-slate-200 px-3 py-1.5 rounded-lg hover:bg-slate-200 font-medium whitespace-nowrap">
                Ir al Gestor de Archivos
            </a>
        </div>

        <!-- Formulario Crear Usuario -->
        <form action="/usuarios" method="POST" class="mb-8 p-4 bg-slate-50 border border-slate-200 rounded-lg flex flex-col gap-3">
            <h2 class="text-xs font-bold text-slate-700 uppercase tracking-wide">Crear Nuevo Usuario</h2>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Nombre de Usuario</label>
                    <input type="text" name="username" placeholder="Ej: juan.perez" required class="w-full text-xs p-2 border border-slate-300 rounded focus:outline-none focus:ring-1 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Correo Electrónico</label>
                    <input type="email" name="email" placeholder="juan@correo.com" required class="w-full text-xs p-2 border border-slate-300 rounded focus:outline-none focus:ring-1 focus:ring-blue-500">
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Contraseña Inicial</label>
                    <input type="password" name="password" placeholder="••••" required class="w-full text-xs p-2 border border-slate-300 rounded focus:outline-none focus:ring-1 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Rol de Acceso</label>
                    <select name="rol" class="w-full text-xs p-2 border border-slate-300 rounded bg-white font-medium">
                        <option value="estandar">Usuario Estándar (Modo Consulta)</option>
                        <option value="admin">Administrador (Control Total)</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg text-xs transition-colors self-end mt-1">
                + Crear Nuevo Usuario
            </button>
        </form>

        <!-- Tabla Usuarios -->
        <h2 class="custom-text text-base font-bold text-slate-800 mb-3">Usuarios Registrados</h2>
        <div class="overflow-x-auto rounded-lg border border-slate-200">
            <table class="w-full text-left text-xs text-slate-700">
                <thead class="bg-slate-50 border-b text-slate-600 font-semibold uppercase">
                    <tr>
                        <th class="p-3">ID</th>
                        <th class="p-3">Usuario</th>
                        <th class="p-3">Correo</th>
                        <th class="p-3">Rol</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-200 bg-white">
                    {% for u in usuarios %}
                    <tr class="hover:bg-slate-50">
                        <td class="p-3 font-mono text-slate-500">{{ u[0] }}</td>
                        <td class="p-3 font-bold text-slate-800">{{ u[1] }}</td>
                        <td class="p-3 text-slate-600">{{ u[2] }}</td>
                        <td class="p-3">
                            <span class="px-2 py-0.5 rounded text-[10px] font-bold {% if u[3] == 'admin' %}bg-purple-100 text-purple-800 border border-purple-200{% else %}bg-slate-100 text-slate-700 border border-slate-200{% endif %}">
                                {{ u[3] }}
                            </span>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
